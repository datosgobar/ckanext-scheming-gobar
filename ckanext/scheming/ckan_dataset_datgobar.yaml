dataset_type: dataset
about: Esquema de metadatos basado en DCAT-AP de datos.gob.ar
about_url: https://datosgobar.github.io/paquete-apertura-datos/perfil-metadatos/




dataset_fields:

# ===========================================================================
# CAMPOS DE DESCRIPCIÓN Y AUTORÍA
# ===========================================================================

# dataset_title | dct:title | Perfil datos.gob.ar #16 | OBLIGATORIO
- field_name: title
  display_property: dct:title
  label:
    en: Dataset Title
    es: Título del dataset
    es_AR: Título del dataset
    es_419: Título del dataset
  form_placeholder: eg. Esquema AIF. Devengado
  preset: title
  help_text:
    en: >
      Title under which the dataset will be published. It should be clear and abstract enough to cover all distributions.
      Recommended maximum: 100 characters (200 if necessary).
    es: >
      Título bajo el cual se publicará el dataset. Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones.
      Máximo recomendado: 100 caracteres (200 si es necesario).
    es_AR: >
      Título bajo el cual se publicará el dataset. Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones.
      Máximo recomendado: 100 caracteres (200 si es necesario).
    es_419: >
      Título bajo el cual se publicará el dataset. Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones. 
      Máximo recomendado: 100 caracteres (200 si es necesario).
  help_inline: true
  required: true

# name | URL del dataset en el portal | (campo interno CKAN, no del perfil de metadatos)
- field_name: name
  label: URL
  preset: dataset_slug
  form_placeholder: eg. my-dataset

#original_identifier| Es el dataset_identifier en el catálogo fuente
- field_name: original_identifier
  label:
    en: Original identifier
    es: Identificador en origen
    es_AR: Identificador en origen
    es_419: Identificador en origen
  form_snippet: null

# owner_org | dct:creator | Perfil datos.gob.ar #18 (catalog_publisher_name) | OBLIGATORIO
- field_name: owner_org
  display_property: dct:creator
  label:
     en: Dataset Owner
     es: Organismo gestor
     es_AR: Organismo gestor
     es_419: Organismo gestor
  preset: dataset_organization
  form_placeholder: eg. Jefatura de Gabinete de Ministros.
  help_text:
    en: >
      Entity responsible of the catalog holding the dataset.
    es: >
      Organismo responsable del catálogo donde se encuentra el dataset.
    es_AR: >
      Organismo responsable del catálogo donde se encuentra el dataset.
    es_419: >
      Organismo responsable del catálogo donde se encuentra el dataset.
  help_inline: true
  required: true


# dataset_publisher_name | dct:publisher | Perfil datos.gob.ar #18 (dataset_publisher_name) | OBLIGATORIO
- field_name: dataset_publisher_name
  display_property: dct:publisher
  label:
     en: Dataset Publisher Name
     es: Organismo publicador
     es_AR: Organismo publicador
     es_419: Organismo publicador
  form_placeholder: eg. Jefatura de Gabinete de Ministros. Secretaría de Medios y Comunicación Pública.
  help_text:
    en: >
      Entity responsible for publishing the dataset.
    es: >
      Organismo responsable de la publicación del dataset. Puede ser el organismo que gestiona el catálogo
      u otro dentro del mismo.
    es_AR: >
      Organismo responsable de la publicación del dataset. Puede ser el organismo que gestiona el catálogo u otro
      dentro del mismo.
    es_419: >
      Organismo responsable de la publicación del dataset.Puede ser el organismo que gestiona el catálogo u otro
      dentro del mismo.
  help_inline: true
  required: true


# dataset_publisher_mbox | dct:publisher / vcard:hasEmail | Perfil datos.gob.ar #19 | RECOMENDADO
- field_name: dataset_publisher_mbox
  label:
    en: Dataset Publisher Contact
    es: Contacto de organismo publicador
    es_AR: Contacto de organismo publicador
    es_419: Contacto de organismo publicador
  display_property: dct:publisher
  form_placeholder: correoisnt@gob.ar
  display_snippet: email.html
  help_text:
    en: "Contact email address of the entity responsible for publishing the dataset."
    es: "Correo electrónico del responsable de la publicación del dataset."
    es_AR: "Correo electrónico del responsable de la publicación del dataset."
    es_419: "Correo electrónico del responsable de la publicación del dataset."
  help_inline: true
  required: false


# notes, equivale a dataset_description | dct:description | Perfil datos.gob.ar #17 | OBLIGATORIO
- field_name: notes
  display_property: dct:description
  label:
    en: Dataset Description
    es: Descripción del dataset
    es_AR: Descripción del dataset
    es_419: Descripción del dataset
  form_placeholder: eg. Describe los componentes de ahorro, inversión, etc
  form_snippet: markdown.html
  help_text:
    en: >
      Clear and concise description of the dataset's content. Recommended maximum: 500 characters (1,500 if necessary).
    es: >
      Descripción clara y concisa del contenido del dataset. Máximo recomendado: 500 caracteres (1.500 si es necesario).
    es_AR: >
      Descripción clara y concisa del contenido del dataset. Máximo recomendado: 500 caracteres (1.500 si es necesario).
    es_419: >
      Descripción clara y concisa del contenido del dataset. Máximo recomendado: 500 caracteres (1.500 si es necesario).
  help_inline: true
  required: true


# ===========================================================================
# CAMPOS DE ESTADO (status, issued, modified)
# ===========================================================================

# dataset_issued | dct:issued | Perfil datos.gob.ar #26 | OBLIGATORIO
- field_name: dataset_issued
  label:
    en: Dataset issued
    es: Fecha de publicación
    es_AR: Fecha de publicación
    es_419: Fecha de publicación
  display_property: dct:issued
  help_text:
    en: >
      Date when the dataset was published.
    es: >
      Fecha en la que se publicó el dataset.
    es_AR: >
      Fecha en la que se publicó el dataset.
    es_419: >
      Fecha en la que se publicó el dataset.
  help_inline: true
  required: true
  preset: date

# dataset_modified | dct:modified | Perfil datos.gob.ar #27 | OBLIGATORIO (cambio: era Recomendado)
- field_name: dataset_modified
  label:
    en: Dataset last modified
    es: Fecha de última modificación
    es_AR: Fecha de última modificación
    es_419: Fecha de última modificación
  display_property: dct:modified
  help_text:
    en: >
      Date of last update or modification of the dataset (either its data or its metadata). Use ISO 8601 format.
    es: >
      Fecha de última actualización o modificación del dataset. Próximamente esta se computará de manera automática y no por carga de usuario.
    es_AR: >
      Fecha de última actualización o modificación del dataset. Próximamente esta se computará de manera automática y no por carga de usuario.
    es_419: >
      Fecha de última actualización o modificación del dataset. Próximamente esta se computará de manera automática y no por carga de usuario.
  help_inline: true
  #required: true
  preset: date
  form_snippet: null

# dataset_status | adms:status | Perfil datos.gob.ar (estado de actualización) | OBLIGATORIO
- field_name: dataset_status
  label:
    en: Dataset status
    es: Estado del dataset
    es_AR: Estado del dataset
    es_419: Estado del dataset
  display_property: adms:status
  preset: select
  form_include_blank_choice: true
  sorted_choices: true
  help_text:
    en: >
      Update status of the dataset.
    es: >
      Estado de actualización en que se encuentra el dataset. Próximamente permitirá carga a mano así como modificación automática.
    es_AR: >
      Estado de actualización en que se encuentra el dataset. Próximamente permitirá carga a mano así como modificación automática.
    es_419: >
      Estado de actualización en que se encuentra el dataset. Próximamente permitirá carga a mano así como modificación automática.
  help_inline: true
  required: true
  choices:
    - value: http://purl.org/adms/status/Completed
      label: actualizado

    - value: http://purl.org/adms/status/Deprecated
      label: desactualizado

    - value: http://purl.org/adms/status/Withdrawn
      label: sin mantenimiento


