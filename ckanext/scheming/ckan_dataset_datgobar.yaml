# distribution_mediaType | dcat:mediaType | Perfil datos.gob.ar (distribución) | RECOMENDADO
# Tipos de medios registrados en el vocabulario oficial IANA Media Types (https://www.iana.org/assignments/media-types/)
- field_name: mimetype
  label:
    en: Media Type
    es: Tipo de medio (IANA)
    es_AR: Tipo de medio (IANA)
    es_419: Tipo de medio (IANA)
  display_property: dcat:mediaType
  preset: select
  form_include_blank_choice: true
  sorted_choices: false
  help_text:
    en: >
      Technical format of the file (e.g. text/csv for spreadsheets, application/json for JSON files).
    es: >
      Formato técnico del archivo (p. ej. text/csv para planillas, application/json para archivos JSON).
    es_AR: >
      Formato técnico del archivo (p. ej. text/csv para planillas, application/json para archivos JSON).
    es_419: >
      Formato técnico del archivo (p. ej. text/csv para hojas de cálculo, application/json para archivos JSON).
  required: false
  choices:
    # Texto
    - value: https://www.iana.org/assignments/media-types/text/csv
      label: text/csv — Valores separados por comas (CSV)

    - value: https://www.iana.org/assignments/media-types/text/plain
      label: text/plain — Texto plano (TXT)

    - value: https://www.iana.org/assignments/media-types/text/html
      label: text/html — Página web (HTML)

    - value: https://www.iana.org/assignments/media-types/text/xml
      label: text/xml — XML de texto

    # Aplicación - datos estructurados
    - value: https://www.iana.org/assignments/media-types/application/json
      label: application/json — JSON

    - value: https://www.iana.org/assignments/media-types/application/geo+json
      label: application/geo+json — GeoJSON

    - value: https://www.iana.org/assignments/media-types/application/ld+json
