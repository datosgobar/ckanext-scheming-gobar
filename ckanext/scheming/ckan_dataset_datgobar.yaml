  # TO MIGRATE: Geographic bounding box dict. Filling with spatial_* values
- field_name: spatial_coverage
  label:
    en: Spatial coverage
    es: Cobertura espacial
    es_AR: Cobertura espacial
    es_419: Cobertura espacial
  form_snippet: null
  display_snippet: null
  repeating_once: true
  repeating_subfields:
    - field_name: uri
      legacy: spatial_uri
      label:
        en: URI
        es: URI

    - field_name: text
      legacy: spatial_uri
      label:
        en: Label
        es: Etiqueta
      form_placeholder: 'España'

    - field_name: geom
      legacy: spatial_geom
      label:
          en: Geometry
          es: Geometría
      form_placeholder: '{"type": "Polygon", "coordinates": [[[11.9936, 54.0486], [11.9936, 54.2466], [12.3045, 54.2466], [12.3045, 54.0486], [11.9936, 54.0486]]]}'
      validators: scheming_valid_json_object

    - field_name: bbox
      legacy: spatial
      label:
          en: Bounding Box
          es: Extensión espacial
      form_placeholder: '{"type": "Polygon", "coordinates": [[[-18.27, 27.54], [4.44, 27.54], [4.44, 43.85], [-18.27, 43.85], [-18.27, 27.54]]]}'
      validators: scheming_valid_json_object

    - field_name: centroid
      legacy: spatial_centroid
      label:
          en: Centroid
          es: Centroide
      form_placeholder: '{"type": "Point", "coordinates": [1.5, 1.5]}'
      validators: scheming_valid_json_object

  help_text:
    en: 'A geographic region that is covered by the dataset.'
    es: 'Región geográfica que abarca el conjunto de datos.'
    es_AR: 'Región geográfica que abarca el conjunto de datos.'
    es_419: 'Región geográfica que abarca el conjunto de datos.'

