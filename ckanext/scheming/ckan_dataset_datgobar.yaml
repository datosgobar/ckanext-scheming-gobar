# distribution_character_set | cnt:characterEncoding | Perfil datos.gob.ar #48 | RECOMENDADO (Consulta Pública)
# Vocabulario: IANA Character Sets (https://www.iana.org/assignments/character-sets/)
# El nombre preferido de cada codificación es el que figura en el registro IANA.
- field_name: character_set
  display_property: cnt:characterEncoding
  label:
    en: Character Set
    es: Conjunto de caracteres
    es_AR: Conjunto de caracteres
    es_419: Conjunto de caracteres
  preset: select
  form_include_blank_choice: true
  sorted_choices: false
  help_text:
    en: >
      Full name of the character encoding standard used for the resource.
      Uses the IANA Character Sets registry (https://www.iana.org/assignments/character-sets/).
    es: >
      Nombre completo del estándar de codificación de caracteres usado para el recurso.
      Usa el registro IANA Character Sets (https://www.iana.org/assignments/character-sets/).
    es_AR: >
      Nombre completo del estándar de codificación de caracteres usado para el recurso.
      Usa el registro IANA Character Sets (https://www.iana.org/assignments/character-sets/).
    es_419: >
      Nombre completo del estándar de codificación de caracteres usado para el recurso.
      Usa el registro IANA Character Sets (https://www.iana.org/assignments/character-sets/).
  help_inline: true
  required: false
  choices:
    # Unicode — las más usadas en datos abiertos modernos
    - value: UTF-8
      label: UTF-8 — Unicode (recomendado, compatible con todos los idiomas)

    - value: UTF-16
      label: UTF-16 — Unicode de 16 bits (común en Windows y Java)

    - value: UTF-16BE
      label: UTF-16BE — Unicode 16 bits Big Endian

    - value: UTF-16LE
      label: UTF-16LE — Unicode 16 bits Little Endian

    - value: UTF-32
      label: UTF-32 — Unicode de 32 bits

    # ISO 8859 — Latin y regionales
    - value: ISO-8859-1
      label: ISO-8859-1 — Latin-1 (Europa Occidental, español sin algunos caracteres)

    - value: ISO-8859-2
      label: ISO-8859-2 — Latin-2 (Europa Central y del Este)

    - value: ISO-8859-15
      label: ISO-8859-15 — Latin-9 (Latin-1 con símbolo € y caracteres adicionales)

    # Windows legacy — muy frecuentes en archivos CSV/shapefile argentinos y latinoamericanos
    - value: windows-1252
      label: windows-1252 — Windows Latin-1 (muy común en archivos legacy del cono sur)

    - value: windows-1250
      label: windows-1250 — Windows Latin-2 (Europa Central)

    - value: windows-1251
      label: windows-1251 — Windows Cyrillic

    # ASCII
    - value: US-ASCII
      label: US-ASCII — ASCII estándar de 7 bits (solo inglés básico)

    # Asiáticas — relevantes para interoperabilidad internacional
    - value: Shift_JIS
      label: Shift_JIS — Japonés (común en datos de SIG japoneses)

    - value: EUC-JP
      label: EUC-JP — Japonés (Unix/Linux)

    - value: GB2312
      label: GB2312 — Chino Simplificado

    - value: Big5
      label: Big5 — Chino Tradicional (Taiwan, Hong Kong)

    - value: EUC-KR
      label: EUC-KR — Coreano

    # Geodatos — usadas por defecto en formatos SIG legacy
    - value: LATIN1
      label: LATIN1 — Alias de ISO-8859-1 (usado por defecto en shapefiles dBASE)

    - value: LATIN2
      label: LATIN2 — Alias de ISO-8859-2 (shapefiles Europa Central)

    # Otros estándares internacionales
    - value: KOI8-R
      label: KOI8-R — Ruso (Unix)

    - value: macintosh
      label: macintosh — Mac Roman (archivos legacy de Apple)


