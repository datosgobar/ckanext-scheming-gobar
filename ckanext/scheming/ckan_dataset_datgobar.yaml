      label:
        en: Economy and Finance (ECON)
        es: Economía y Finanzas (ECON)
        es_AR: Economía y Finanzas (ECON)
        es_419: Economía y Finanzas (ECON)

    - value: http://publications.europa.eu/resource/authority/data-theme/EDUC
      label:
        en: Education, Culture and Sport (EDUC)
        es: Educación, Cultura y Deporte (EDUC)
        es_AR: Educación, Cultura y Deporte (EDUC)
        es_419: Educación, Cultura y Deporte (EDUC)

    - value: http://publications.europa.eu/resource/authority/data-theme/SOCI
      label:
        en: Population and Society (SOCI)
        es: Población y Sociedad (SOCI)
        es_AR: Población y Sociedad (SOCI)
        es_419: Población y Sociedad (SOCI)

    - value: http://publications.europa.eu/resource/authority/data-theme/ENER
      label:
