dataset_type: dataset
about: Esquema de metadatos basado en DCAT-AP de datos.gob.ar
about_url: https://datosgobar.github.io/paquete-apertura-datos/perfil-metadatos/




dataset_fields:

#CAMPOS DE DESCRIPCIÓN Y AUTORÍA
#dataset title
- field_name: dataset_title
  display_property: dct:title
  label:
    en: Dataset Title
    es: Título del dataset
    es_AR: Título del dataset
    es_419: Título del dataset
  form_placeholder: eg. Esquema AIF. Devengado
  preset: title
  help_text:
    en: >
      Title under which the dataset will be published. It should be clear and abstract enough to cover all distributions.
      Recommended maximum: 100 characters (200 if necessary).
    es: >
      Título bajo el cual se publicará el dataset. Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones.
      Máximo recomendado: 100 caracteres (200 si es necesario).
    es_AR: >
      Título bajo el cual se publicará el dataset. Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones.
      Máximo recomendado: 100 caracteres (200 si es necesario).
    es_419: >
      Título bajo el cual se publicará el dataset. Debe ser claro y lo suficientemente abstracto para abarcar todas sus distribuciones.
      Máximo recomendado: 100 caracteres (200 si es necesario).
  help_inline: true
  required: true

#name: url que tendrá en el portal
- field_name: name
  label: URL
  preset: dataset_slug
  form_placeholder: eg. my-dataset


#dataset publisher name
- field_name: owner_org
  display_property: dct:publisher
  label:
     en: Dataset Publisher Name
     es: Organismo publicador
     es_AR: Organismo publicador
     es_419: Organismo publicador
  preset: dataset_organization
  form_placeholder: eg. Jefatura de Gabinete de Ministros. Secretaría de Medios y Comunicación Pública.
  help_text:
    en: >
      Entity responsible for publishing the dataset. For organizations, use the hierarchical structure separated by dots.
    es: >
      Responsable de la publicación del dataset. Para organizaciones, usar estructura jerárquica separada por puntos.
    es_AR: >
      Responsable de la publicación del dataset. Para organizaciones, usar estructura jerárquica separada por puntos.
    es_419: >
      Responsable de la publicación del dataset. Para organizaciones, usar estructura jerárquica separada por puntos.

  help_inline: true
  required: true


#dataset publisher email
- field_name: dataset_publisher_mbox
  label:
    en: Dataset Publisher Contact
    es: Contacto de organismo publicador
    es_AR: Contacto de organismo publicador
    es_419: Contacto de organismo publicador
  display_property: dct:publisher
  form_placeholder: correoisnt@gob.ar
  display_snippet: email.html
  help_text:
    en: >
      Contact email address of the entity responsible for publishing the dataset.
    es: >
      Correo electrónico de contacto del responsable de la publicación del dataset.
    es_AR: >
      Correo electrónico de contacto del responsable de la publicación del dataset.
    es_419: >
      Correo electrónico de contacto del responsable de la publicación del dataset.
  help_inline: true
  required: false


  #dataset description
- field_name: dataset_description
  display_property: dct:description
  label:
    en: Dataset Description
    es: Descripción del dataset
    es_AR: Descripción del dataset
    es_419: Descripción del dataset
  form_placeholder: eg. Describe los componentes de ahorro, inversión, etc
  form_snippet: markdown.html
  help_text:
    en: >
      Clear and concise description of the dataset's content. Recommended maximum: 500 characters (1,500 if necessary).
    es: >
      Descripción clara y concisa del contenido del dataset. Máximo recomendado: 500 caracteres (1.500 si es necesario).
    es_AR: >
      Descripción clara y concisa del contenido del dataset. Máximo recomendado: 500 caracteres (1.500 si es necesario).
    es_419: >
      Descripción clara y concisa del contenido del dataset. Máximo recomendado: 500 caracteres (1.500 si es necesario).
  help_inline: true
  required: true

#CAMPOS DE ESTADO (status, issued, modified)
- field_name: dataset_issued
  label:
    en: Dataset issued
    es: Fecha de publicación
    es_AR: Fecha de publicación
    es_419: Fecha de publicación
  display_property: dct:issued
  help_text:
    en: >                                                                                              
      Date when the dataset was published. Use ISO 8601 format, as a date or date-time, with the highest relevant level of detail.
    es: >                                                                                              
      Fecha en la que se publicó el dataset. Usar formato ISO 8601, como fecha o fecha con hora, con el mayor nivel de detalle relevante.
    es_AR: >
      Fecha en la que se publicó el dataset. Usar formato ISO 8601, como fecha o fecha con hora, con el mayor nivel de detalle relevante.
    es_419: >
      Fecha en la que se publicó el dataset. Usar formato ISO 8601, como fecha o fecha con hora, con el mayor nivel de detalle relevante.
  help_inline: true
  required: true
  preset: date

- field_name: dataset_status
  label:
    en: Dataset status
    es: Estado del dataset
    es_AR: Estado del dataset
    es_419: Estado del dataset
  display_property: adms:status
  preset: select
  form_include_blank_choice: true
  sorted_choices: true
  help_text:
    en: > 
      Update status of the dataset
    es: >                                                                                              
      Estado de actualización en que se encuentra el dataset
    es_AR: >
      Estado de actualización en que se encuentra el dataset
    es_419: >
      Estado de actualización en que se encuentra el dataset
  help_inline: true
  required: true
  choices:
    - value: http://purl.org/adms/status/Completed
      label: actualizado

    - value: http://purl.org/adms/status/Deprecated
      label: desactualizado

    - value: http://purl.org/adms/status/Withdrawn
      label: sin mantenimiento



#CAMPOS DE TOPICOS (supertheme, theme, keyword,hvd_category)
- field_name: dataset_superTheme
  label:
    en: Dataset superTheme
    es: Tema general del dataset
    es_AR: Tema general del dataset
    es_419: Tema general del dataset
  display_property: dct:theme
  help_text:
    en: >
      Global theme(s) or category(ies) the dataset belongs to. Multiple values may be selected.
      Categories follow the EU Publications Office taxonomy.
    es: >
      Temática(s) o categoría(s) globales a las que pertenece el dataset. Se pueden seleccionar múltiples valores.
      Las categorías siguen la taxonomía de la Oficina de Publicaciones de la UE.
    es_AR: >
      Temática(s) o categoría(s) globales a las que pertenece el dataset. Se pueden seleccionar múltiples valores.
      Las categorías siguen la taxonomía de la Oficina de Publicaciones de la UE.
    es_419: >
      Temática(s) o categoría(s) globales a las que pertenece el dataset. Se pueden seleccionar múltiples valores.
      Las categorías siguen la taxonomía de la Oficina de Publicaciones de la UE.
