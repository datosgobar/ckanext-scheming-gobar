    en: Dataset Theme
    es: Tema específico del dataset
    es_AR: Tema específico del dataset
    es_419: Tema específico del dataset
  display_property: dcat:theme
  help_text:
    es: "Categorías temáticas específicas del dataset.Deben usarse los ids de la taxonomía autorizada por la Dirección. La misma se encuentra en construcción."
    es_AR: "Categorías temáticas específicas del dataset.Deben usarse los ids de la taxonomía autorizada por la Dirección. La misma se encuentra en construcción."
    es_419: "Categorías temáticas específicas del dataset.Deben usarse los ids de la taxonomía autorizada por la Dirección. La misma se encuentra en construcción."
    en: "Specific thematic categories of the dataset.Use the ids from the taxonomy defined by the Catalog authority."
  help_inline: true
  required: true
  preset: multiple_select
  form_include_blank_choice: true
  sorted_choices: true
  choices:
    - value: Tema específico 1
      label:
        en: Specific theme 1
        es: Tema específico 1
        es_AR: Tema específico 1
        es_419: Tema específico 1

    - value: Tema específico 2
      label:
        en: Specific theme 2
        es: Tema específico 2
        es_AR: Tema específico 2
        es_419: Tema específico 2

    - value: Tema específico 3
      label:
        en: Specific theme 3
        es: Tema específico 3
        es_AR: Tema específico 3
        es_419: Tema específico 3




# dataset_keywords | dcat:keyword | Perfil datos.gob.ar #24 | OBLIGATORIO (cambio: era Recomendado)
- field_name: dataset_keywords
  label:
    en: Dataset Keywords
    es: Palabras claves del dataset
    es_AR: Palabras clave del dataset
    es_419: Palabras clave del dataset
  help_text:
    en: >
      Keywords or tags describing the dataset's title or content.
      Use clear, well-spelled terms, preferably in plural, and consistent with existing tags.
    es: >
      Palabras clave o etiquetas que describen el título o el contenido del dataset.
      Usar términos claros, bien escritos, preferentemente en plural y consistentes con etiquetas existentes.
    es_AR: >
      Palabras clave o etiquetas que describen el título o el contenido del dataset.
      Usar términos claros, bien escritos, preferentemente en plural y consistentes con etiquetas existentes.
    es_419: >
      Palabras clave o etiquetas que describen el título o el contenido del dataset.
      Usar términos claros, bien escritos, preferentemente en plural y consistentes con etiquetas existentes.
  help_inline: true
  required: true
  preset: tag_string_autocomplete
  form_placeholder: eg. economy, mental health, government

# dataset_hvdcategory | dcatap:hvdCategory | Categoría de alto valor (HVD) | OBLIGATORIO
# Basado en el Reglamento de Ejecución (UE) 2023/138 sobre conjuntos de datos de alto valor
- field_name: dataset_hvdCategory
  label:
    en: High value category
    es: Categoría de alto valor
    es_AR: Categoría de alto valor
    es_419: Categoría de alto valor
  display_property: dcatap:hdvCategory
  preset: select
  form_include_blank_choice: true
  sorted_choices: true
  help_text:
    en: >
      High-value category to which the dataset belongs.
    es: >
      Categoría de alto valor a la que pertenece el dataset. Deben usarse los ids de la taxonomía autorizada por la Dirección. La misma se encuentra en construcción.
    es_AR: >
      Categoría de alto valor a la que pertenece el dataset. Deben usarse los ids de la taxonomía autorizada por la Dirección. La misma se encuentra en construcción.
    es_419: >
      Categoría de alto valor a la que pertenece el dataset. Deben usarse los ids de la taxonomía autorizada por la Dirección. La misma se encuentra en construcción.
  help_inline: true
  required: true
  choices:
    - value: no aplica
      label: no aplica

    - value: datos para IA
      label: datos para IA

    - value: categoria 1
      label: categoria 1

    - value: categoria 2
      label: categoria 2

