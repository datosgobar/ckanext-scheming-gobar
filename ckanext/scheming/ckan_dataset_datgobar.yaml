      - field_name: uri
      - field_name: text
  display_property: dct:spatial
  select_size: 5
  sorted_choices: False
  form_include_blank_choice: False
  choices:
    - label:
        es: Otro
        en: Other
        es_AR: Otro
        es_419: Otro
      value: Otro

    - label:
        es: Argentina
        en: Argentina
