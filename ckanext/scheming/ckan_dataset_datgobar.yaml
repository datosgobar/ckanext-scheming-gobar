      Temática(s) o categoría(s) globales a las que pertenece el dataset. Las categorías siguen la taxonomía de la Oficina de Publicaciones de la UE.
    es_AR: >
      Temática(s) o categoría(s) globales a las que pertenece el dataset. Las categorías siguen la taxonomía de la Oficina de Publicaciones de la UE.
    es_419: >
