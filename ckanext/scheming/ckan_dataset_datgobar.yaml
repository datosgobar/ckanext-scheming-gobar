# spatial | dct:spatial / locn:geometry (bbox) | Perfil datos.gob.ar #29 | RECOMENDADO (cambio: era Opcional)
# Se completa automáticamente si se selecciona un identificador provincial.
- field_name: spatial
  label:
    en: Bounding Box
    es: Extensión espacial
    es_AR: Extensión espacial
    es_419: Extensión espacial
  preset: spatial_dependent_fields
  dependent_fields:
    field_name: spatial_coverage
    subfields:
      - field_name: bbox
