- field_name: dataset_keywords
  help_text:
    en: >
      Keywords or tags describing the dataset’s title or content.
      Use clear, well-spelled terms, preferably in plural, and consistent with existing tags.
    es: >
      Palabras clave o etiquetas que describen el título o el contenido del dataset.
      Usar términos claros, bien escritos, preferentemente en plural y consistentes con etiquetas existentes.
  help_inline: true
  preset: tag_string_autocomplete
  form_placeholder: eg. economy, mental health, government


#CAMPOS TEMPORALES (accrualPeriodicity, temporalcoverage)
- field_name: dataset_accrualPeriodicity
  label: Dataset Accrual Periodicity
  help_text:
    en: >
      Frequency at which the dataset is updated.
      Use normalized ISO 8601 periods, or select “Irregular” if the frequency is not fixed.
    es: >
      Frecuencia con la que se actualiza el dataset.
      Usar períodos normalizados ISO 8601 o seleccionar “eventual” si la frecuencia no es fija.
  help_inline: true
  required: true
  preset: select
  form_include_blank_choice: true
  sorted_choices: true
  display_property: dct:accrualPeriodicity
  choices:
    - value: http://publications.europa.eu/resource/authority/frequency/HOURLY
      label: R/PT1S

    - value: http://publications.europa.eu/resource/authority/frequency/HOURLY
      label: R/PT1H

    - value: http://publications.europa.eu/resource/authority/frequency/DAILY
      label: R/P1D

    - value: http://publications.europa.eu/resource/authority/frequency/WEEKLY
      label: R/P1W

    - value: http://publications.europa.eu/resource/authority/frequency/MONTHLY
      label: R/P0.5M

    - value: http://publications.europa.eu/resource/authority/frequency/MONTHLY
      label: R/P1M

    - value: http://publications.europa.eu/resource/authority/frequency/BIMONTHLY
      label: R/P2M

    - value: http://publications.europa.eu/resource/authority/frequency/QUARTERLY
      label: R/P3M

    - value: http://publications.europa.eu/resource/authority/frequency/ANNUAL_3
      label: R/P4M

    - value: http://publications.europa.eu/resource/authority/frequency/ANNUAL_2
      label: R/P6M

    - value: http://publications.europa.eu/resource/authority/frequency/ANNUAL
      label: R/P1Y

    - value: http://publications.europa.eu/resource/authority/frequency/BIENNIAL
      label: R/P2Y

    - value: http://publications.europa.eu/resource/authority/frequency/QUADRENNIAL
      label: R/P4Y

    - value: http://publications.europa.eu/resource/authority/frequency/DECENNIAL
      label: R/P10Y

    - value: http://publications.europa.eu/resource/authority/frequency/IRREG
      label: eventual

- field_name: temporal_start
  label:
    en: Temporal extent (Start)
    es: Cobertura temporal (Inicio)
  dependent_fields:
    field_name: temporal_coverage
    subfields:
      - field_name: start
  display_property: dct:temporal
  preset: date_dependent_fields
  form_group_id: temporal_info

# Temporal end (O)
- field_name: temporal_end
  label:
    en: Temporal extent (End)
    es: Cobertura temporal (Fin)
  dependent_fields:
    field_name: temporal_coverage
    subfields:
      - field_name: end
  display_property: dct:temporal
  preset: date_dependent_fields
  form_group_id: temporal_info

# TO MIGRATE: Temporal coverage dict. Filling with temporal_* values
- field_name: temporal_coverage
  label:
    en: Temporal coverage
    es: Cobertura temporal
  form_snippet: null
  display_snippet: null
  repeating_once: true
  repeating_subfields:
    - field_name: start
      legacy: temporal_start
      label:
        en: Temporal extent (Start)
        es: Cobertura temporal (Inicio)

    - field_name: end
      legacy: temporal_end
      label:
        en: Temporal extent (End)
        es: Cobertura temporal (Fin)

  help_text:
    en: The temporal period or periods the dataset covers.
    es: Periodo o periodos temporales que abarca el conjunto de datos.


#CAMPOS GEOGRÄFICOS*

#CAMPOS DE FUENTES Y LICENCIA (source, license)




- field_name: license_id
  label: License
  form_snippet: license.html
  help_text: License definitions and additional information can be found at http://opendefinition.org/



- field_name: url
  label: Source
  form_placeholder: http://example.com/dataset.json
  display_property: foaf:homepage
  display_snippet: link.html

resource_fields:

- field_name: url
  label: URL
  preset: resource_url_upload

- field_name: name
  label: Name
  form_placeholder: eg. January 2011 Gold Prices

- field_name: description
  label: Description
  form_snippet: markdown.html
  form_placeholder: Some useful notes about the data

- field_name: format
  label: Format
  preset: resource_format_autocomplete
